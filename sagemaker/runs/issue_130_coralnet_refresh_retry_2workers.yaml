job:
  # Hypothesis test (issue #130): does LOW concurrency avoid the page-1 browse
  # timeouts? Same image + source list as issue_130_coralnet_refresh_retry.yaml,
  # but only 2 parallel shards instead of 7 to reduce simultaneous load on
  # coralnet.ucsd.edu. See docs/sagemaker.md "CoralNet load & image-size behavior".
  name_prefix: mermaidseg-coralnet-refresh-2w
  image: mermaid-segmentation-jobs:processing-etl-2026-06-20-retry
  entrypoint: scripts/sagemaker_processing_entrypoint.py
  instance_type: ml.m5.xlarge
  volume_gb: 20
  max_runtime_hours: 12
  env:
    MERMAID_CORALNET_BUCKET: dev-datamermaid-sm-sources
    MERMAID_CORALNET_PREFIX: coralnet-public-images
    CORALNET_USERNAME: ${CORALNET_USERNAME}
    CORALNET_PASSWORD: ${CORALNET_PASSWORD}

processing:
  container_args:
    - --task=coralnet-refresh
    - --browse-workers=10
    - --verbose
  shard:
    items_from: coralnet_refresh_retry_sources.csv
    items_column: source_id
    workers: 2
    per_worker_arg: --source-ids
