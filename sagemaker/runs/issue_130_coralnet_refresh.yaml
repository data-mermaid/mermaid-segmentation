job:
  name_prefix: mermaidseg-coralnet-refresh
  image: mermaid-segmentation-jobs:processing-etl-2026-06-20
  entrypoint: scripts/sagemaker_processing_entrypoint.py
  instance_type: ml.m5.xlarge
  volume_gb: 20
  max_runtime_hours: 8
  env:
    MERMAID_CORALNET_BUCKET: dev-datamermaid-sm-sources
    MERMAID_CORALNET_PREFIX: coralnet-public-images
    CORALNET_USERNAME: ${CORALNET_USERNAME}
    CORALNET_PASSWORD: ${CORALNET_PASSWORD}

processing:
  container_args:
    - --task=coralnet-refresh
    - --browse-workers=10
    - --verbose
  shard:
    items_from: coralnet_refresh_sources.csv
    items_column: source_id
    workers: 7
    per_worker_arg: --source-ids
