      transform:
        SmallestMaxSize:
          max_size: 1024
        RandomResizedCrop:
          size: [512, 512]
          scale: [0.2, 1]
          ratio: [0.75, 1.33]
        HorizontalFlip:
          p: 0.5
        VerticalFlip:
          p: 0.5
        Normalize:
