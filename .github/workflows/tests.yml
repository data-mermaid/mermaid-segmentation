name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen --group tests
      - name: Run unit tests
        run: uv run pytest -m "not slow and not integration" --cov=mermaidseg --cov-report=term-missing
