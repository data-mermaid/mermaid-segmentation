name: Notebook Quality One-Shot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.ipynb'
  pull_request:
    paths:
      - '**/*.ipynb'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
      - name: Detect changed notebooks
        id: changed-notebooks
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.ipynb
          separator: "\n"
      - name: Lint changed notebook cells
        if: steps.changed-notebooks.outputs.any_changed == 'true'
        run: |
          mapfile -t NOTEBOOK_FILES <<< "${{ steps.changed-notebooks.outputs.all_changed_files }}"
          uv run --group notebooks-ci nbqa ruff "${NOTEBOOK_FILES[@]}"
