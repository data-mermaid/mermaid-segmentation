name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "**/*.pyi"
      - "**/*.ipynb"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "**/*.py"
      - "**/*.pyi"
      - "**/*.ipynb"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lint.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Detect changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.py
            **/*.pyi
            **/*.ipynb
      - name: Check lockfile is up to date
        run: uv lock --check
      - name: Ruff check (changed files only)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: uv run --group lint ruff check ${{ steps.changed-files.outputs.all_changed_files }}
      - name: Ruff format check (changed files only)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: uv run --group lint ruff format --check ${{ steps.changed-files.outputs.all_changed_files }}
