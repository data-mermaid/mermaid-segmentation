data:
  default: 
    train:
      transform:
        Resize:
          width: 1036
          height: 1036
        RandomScale:
          scale_limit: [0.2, 1]
        RandomCrop:
          width: 512
          height: 512
        HorizontalFlip:
          p: 0.5
        VerticalFlip:
          p: 0.5
        Normalize:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
    val:
      transform:
          Resize:
            width: 512
            height: 512
          Normalize:
            mean: [0.485, 0.456, 0.406]
            std: [0.229, 0.224, 0.225]

  coralnet:
    train:
      whitelist_sources: [1645, 1776, 1783, 2055, 3058, 3064, 3363, 3401, 3411, 
                          3425, 3460, 4430, 4559, 4710, 4882, 5086, 5155, 5221, 
                          6053, 6537, 6687, 6699, 6716, 6722, 6733, 6835, 6838, 
                          6839, 6855, 6868, 6923, 6924, 6929, 6930]
    val:  
      whitelist_sources: [1968, 3478, 3573, 4342, 4514, 6695, 6698, 6700, 6717, 
                          6834, 6920, 6928, 6931, 6968, 7054]

  mermaid: # the dataset has to be mentioned in the data_config even if the default arguments are used
  #     train_data_ratio: 0.7
  #     val_data_ratio: 0.15

  # catlin_seaview:
  #   train:
  #     whitelist_regions: ["ATL", "IND_CHA", "IND_MDV", "PAC_AUS"]
  #   val:
  #     whitelist_regions: ["PAC_IDN_PHL", "PAC_SLB", "PAC_TLS", "PAC_TWN", "PAC_USA"]

  coralscapes:
    train:
      split: train
      transform:
        Resize:
          width: 1436
          height: 1736
        RandomScale:
          scale_limit: [0.2, 1]
        RandomCrop:
          width: 512
          height: 512
        HorizontalFlip:
          p: 0.5
        Normalize:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
    val:
      split: validation
      transform:
        Resize:
          width: 512
          height: 512
        Normalize:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]