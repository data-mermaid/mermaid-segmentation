data:
  default: 
    train:
      transform:
        SmallestMaxSize:
          max_size: 1024
        RandomResizedCrop:
          size: [512, 512]
          scale: [0.2, 1]
          ratio: [0.75, 1.33]
        HorizontalFlip:
          p: 0.5
        VerticalFlip:
          p: 0.5
        Normalize:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
    val:
      transform:
          Resize:
            width: 512
            height: 512
          Normalize:
            mean: [0.485, 0.456, 0.406]
            std: [0.229, 0.224, 0.225]

  coralnet:
    train:
      whitelist_sources: [1645, 1776, 1783, 2055, 3058, 3064, 3363, 3401, 3411, 
                          3425, 3460, 4430, 4559, 4710, 4882, 5086, 5155, 5221, 
                          6053, 6537, 6687, 6699, 6716, 6722, 6733, 6835, 6838, 
                          6839, 6855, 6868, 6923, 6924, 6929, 6930]
    val:  
      whitelist_sources: [1968, 3478, 3573, 4342, 4514, 6695, 6698, 6700, 6717, 
                          6834, 6920, 6928, 6931, 6968, 7054]

  mermaid: 
    val: None # We currently have no validation data for the mermaid dataset, so we set this to None to avoid speculation.

  coralscapes:
    train:
      split: train
      transform:
        RandomResizedCrop:
          size: [512, 512]
          scale: [0.2, 1]
          ratio: [0.75, 1.33]
        HorizontalFlip:
          p: 0.5
        Normalize:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]
    val:
      split: validation
      transform:
        Resize:
          width: 512
          height: 512
        Normalize:
          mean: [0.485, 0.456, 0.406]
          std: [0.229, 0.224, 0.225]

  benthos_yuval:
    train: None 
    val:
      whitelist_sites: ["RS24", "CR_DoubleWreck"]

  catlin_seaview:
    train:
      whitelist_regions: ["ATL", "IND_CHA", "IND_MDV", "PAC_AUS", "PAC_IDN_PHL", "PAC_SLB" ,"PAC_TLS" ,"PAC_TWN" ,"PAC_USA"]
    val: None

  moorea_labeled_corals:
    train:
      whitelist_years: ["2008","2009","2010"]
    val: None

  pacific_labeled_corals:
    train: None
    val:
      whitelist_subsets: ["reference", "evaluation"]