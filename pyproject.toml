[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mermaidseg"
version = "0.1.0"
description = "A package for the training, evaluation and usage of image segmentation models for coral reef data."
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    "albumentations>=2.0",
    "boto3>=1.42",
    "numpy>=1.24,<2",        # <2: numpy 2.0 C-API breaks torch and compiled extensions
    "pandas>=2.0",
    "pillow>=10.0",
    "requests>=2.32",
    "torch>=2.0,<2.3",       # <2.3: SageMaker image compatibility
    "transformers>=4.40",
    "datasets>=2.0",
    "s3fs>=0.4",
    "segmentation-models-pytorch>=0.5",
    "mlflow>=2.0",
    "psutil>=5.9.0",
    "pyyaml>=6.0",
    "nvidia-ml-py>=12.0.0",
    "tqdm>=4.60",
    "torchmetrics>=1.0",
    "anytree>=2.0",
    "openpyxl>=3.1",
    "huggingface-hub>=0.36.2",
    "opencv-python-headless>=4.11.0.86",
    "sagemaker-mlflow>=0.2.0",
    "requests-auth-aws-sigv4>=0.7",
    "safetensors>=0.4.0",
]

[project.optional-dependencies]
scraping = [
    "selenium>=4.0",
    "webdriver-manager>=4.0",
]

[dependency-groups]
notebooks = [
    "jupyter>=1.1",
    "ipykernel>=7.2.0",
    "ipywidgets>=8.0",
    "matplotlib>=3.10.8",
    "seaborn>=0.13.2",
    "wandb>=0.25.0",
    "ibis-framework[duckdb]>=12.0.0",
    "hvplot>=0.11.0",
    "great-tables>=0.15.0",
]
tests = [
    "pytest>=8.0",
    "pytest-cov>=4.0",
]
lint = [
    "ruff>=0.6.0",
    "pre-commit>=3.0",
]
docs = [
    "sphinx>=7.0",
    "pydata-sphinx-theme>=0.15",
]

[tool.hatch.build.targets.wheel]
packages = ["mermaidseg"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4"]

[tool.ruff.lint.isort]
known-first-party = ["mermaidseg"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "-ra",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
]

[tool.coverage.run]
source = ["mermaidseg"]
omit = ["tests/*", "*/conftest.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
